version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slackline
      POSTGRES_USER: slackline
      POSTGRES_PASSWORD: slackline
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slackline"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://slackline:slackline@db/slackline
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: http://localhost:3000
      DATA_DIR: /app/data
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
  frontend:
    build:
      context: ./frontend
      target: dev
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_BASE_URL: http://localhost:8000
volumes:
  pgdata:
  uploads:
